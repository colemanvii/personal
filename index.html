<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cole Calfee</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --text: #9a9da1;
      --text-dark: #6f7378;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 200;
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 3vw; /* push text far left */
      padding-top: 6vh;
      padding-bottom: 6vh;
    }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.9rem;
      line-height: 1.05;
    }

    .stack a,
    .stack span {
      display: block;
      font-size: clamp(0.8rem, 1.8vw, 1.2rem);
      font-weight: 300;
      color: var(--text);
      transition: color 0.18s ease;
    }

    .stack .name {
      color: var(--text-dark);
      margin-bottom: 1.2rem;
    }

    .stack a:hover {
      color: var(--text-dark);
    }

    @media (max-width: 700px) {
      .page {
        padding-left: 6vw;
      }

      .stack a,
      .stack span {
        font-size: clamp(0.9rem, 3vw, 1.3rem);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="stack" aria-label="Cole Calfee landing page navigation">
      <span class="name">Cole Calfee</span>
      <a href="mailto:hello@colecalfee.com">Inquire</a>
      <a href="#">Available Works</a>
      <a href="https://instagram.com/colecalfee" target="_blank" rel="noopener noreferrer">Instagram</a>
    </div>
  </main>
</body>
</html>
