<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cole Calfee</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --text: #7a7d81;
      --dark: #4f5358;
      --line: #e6e8ea;
      --white: #fbfcfd;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      background: var(--bg);
    }

    .still {
      position: relative;
      display: grid;
      place-items: center;
      padding: 5vw;
    }

    .frame {
      position: relative;
      width: min(68vw, 860px);
      aspect-ratio: 4 / 5;
      border: 1px solid var(--line);
      background: var(--white);
      overflow: hidden;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.9) contrast(1.01);
    }

    .meta {
      position: absolute;
      left: 32px;
      bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 11px;
      line-height: 1.4;
      color: var(--dark);
      mix-blend-mode: multiply;
    }

    .meta .title {
      color: var(--dark);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 22px 28px;
      border-top: 1px solid var(--line);
      font-size: 11px;
      background: rgba(246, 247, 248, 0.98);
    }

    .footer-left,
    .footer-right {
      display: flex;
      gap: 20px;
      align-items: center;
      white-space: nowrap;
    }

    .footer a {
      transition: opacity 0.2s ease;
    }

    .footer a:hover {
      opacity: 0.55;
    }

    @media (max-width: 900px) {
      .frame {
        width: min(82vw, 860px);
      }

      .meta {
        left: 20px;
        bottom: 18px;
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100vh;
        height: auto;
      }

      .still {
        padding: 22px 16px 16px;
      }

      .frame {
        width: 100%;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 16px;
      }

      .footer-left,
      .footer-right {
        gap: 14px;
        flex-wrap: wrap;
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="still" aria-label="Landing page">
      <figure class="frame">
        <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=1600&q=80" alt="Featured painting" />
        <figcaption class="meta">
          <span class="title">Cole Calfee</span>
          <span>Paintings / Drawings</span>
        </figcaption>
      </figure>
    </section>

    <footer class="footer">
      <div class="footer-left">
        <span>Cole Calfee</span>
      </div>
      <div class="footer-right">
        <a href="mailto:hello@colecalfee.com">Inquire</a>
        <a href="https://instagram.com/colecalfee" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="#">Available Works</a>
      </div>
    </footer>
  </main>
</body>
</html>
